<div class="container col-md-6 mt-5">
  <div class="card shadow">
    <div class="card-header bg-success text-white">
      <h5 class="card-title mb-0">Create New Admin</h5>
    </div>
    <div class="card-body">
      <form [formGroup]="registerform" (ngSubmit)="onsubmit()">
        <div class="form-group mb-3">
          <label for="name" class="form-label">Name</label>
          <input id="name" placeholder="Enter admin name" formControlName="name" type="text" class="form-control">
        </div>

        <div class="form-group mb-3">
          <label for="email" class="form-label">Email</label>
          <input id="email" placeholder="Enter admin email" formControlName="email" type="email" class="form-control">
        </div>

        <div class="form-group mb-3">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" placeholder="Enter password" formControlName="password" class="form-control">
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-success" [disabled]="registerform.invalid">Create Admin</button>
        </div>
      </form>
    </div>
  </div>
</div>
