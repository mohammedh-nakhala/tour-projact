<div class="container col-md-5 mt-5">
  <div class="card">
    <div class="card-body">
      <h5 class="class-title">tours</h5>
      <p class="card-text">Lorem ipsum dolor sit amet.</p>

      <form [formGroup]="tourform">
      <div class="form-group">
        <input placeholder="name" formControlName="name" type="text" class="form-control my-3">
      </div>

      <div class="form-group">
        <input placeholder="price" type="number" formControlName="price" class="form-control my-3">
      </div>

      <div class="form-group">
        <input type="text" placeholder="destination" formControlName="destination" class="form-control my-3">
      </div>
      <div class="form-group">
        <input type="url" placeholder="image" formControlName="img" class="form-control my-3">
      </div>
      <div class="d-grid">


        @if (tourform.invalid) {<button  [disabled]="this.tourform.invalid" class="btn btn-info"> add new tour </button>}
        @else {<button (click)="onSubmit()" [disabled]="this.tourform.invalid" class="btn btn-info"> add new tour </button>}


      </div>
        </form>
    </div>
  </div>
</div>
