<div class="container col-md-6 mt-5">
  <div class="card">
    <div class="card-body">
      <h5 class="class-title">tours</h5>
      <p class="card-text">Lorem ipsum dolor sit amet.</p>
      <table class="table ">
        <tr>
          <th>id</th>
          <th>name</th>
          <th>price</th>
          <th>destination</th>
          <th>img</th>
          <th>action</th>
        </tr>
        @for (item of alldata; track $index) {
          <tr>
            <td> {{item.id}} </td>
            <td> {{item.name}} </td>
            <td> {{item.price	}} </td>
            <td> {{item.destination}} </td>
            <td> <img [src]="item.img" width="70" alt=""> </td>
            <td><a [routerLink]="['/admin/tu', item.id]" class="btn btn-warning">EDIT</a><button (click)="remove(item.id)" class="btn btn-danger">DELETE</button></td>
          </tr>
         }


      </table>

    </div>
  </div>
</div>
